name: Build project and upload artifact

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
      build:
        required: true
        type: boolean
    outputs:
      artifact-name:
        description: "Name of the uploaded build artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if artifact already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT=$(gh api /repos/${{ github.repository }}/actions/artifacts \
            --jq ".artifacts[] | select(.name == \"build-${{ inputs.sha }}\" and .expired == false) | .id" \
            | head -1)

          if [[ -n "$ARTIFACT" ]]; then
            echo "✅ Artifact already exists — skipping build"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No artifact found — will build"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
    
  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.exists == 'false'
    outputs:
      artifact-name: build-${{ inputs.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
        
      - name: NPM Clean Install
        run: npm ci

      - name: Lint
        if: ${{ inputs.build == false }} 
        run: npm run lint

      - name: Build
        if: ${{ inputs.build == true }}
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
          DISABLE_TELEMETRY: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.sha }}
          path: ${{ inputs.build == true && '.next/' || '.' }}
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true