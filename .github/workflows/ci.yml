name: Run and Test Next Project

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

permissions:
  contents: write

jobs:
  set-environment:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
 
      - id: set-env
        uses: ./.github/actions/set-environment
    
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs: set-environment
    environment: ${{ needs.set-environment.outputs.environment }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup project
        uses: ./.github/actions/setup
        with:
          node-version: ${{ vars.NODE_VERSION }}
      
      - name: Check if playwright installed
        run: |
          if [[ -z $(ls -la node_modules/.bin/playwright 2>/dev/null) ]]; then
            echo -e "\033[0;31mPlaywright tests NOT configured. Please install playwright module.\033[0m"
            exit 1
          fi;

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
 
      - name: Install Playwright system deps (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: "Firebase Tools: Setup Java 21"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ vars.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 1

  set-report-name:
    name: Name Playwright report before exposing it
    runs-on: ubuntu-latest
    needs: set-environment
    if: success()

    outputs:
      report-prefix: ${{ steps.set-prefix.outputs.report-prefix }}

    steps:
      - name: Resolve report prefix
        id: set-prefix
        run: |
          if [[ -n "${{ github.head_ref }}" ]]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi
          BRANCH=$(echo "${BRANCH}" | sed 's/\//-/g')
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "report-prefix=${BRANCH}/${SHORT_SHA}" >> $GITHUB_OUTPUT

  publish-report:
    name: Publish report to GitHub Pages
    runs-on: ubuntu-latest
    needs: [set-report-name, test]
    if: "success() || needs.test.result == 'failure'"
 
    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
 
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true  # Branch may not exist on first run
 
      - name: Init gh-pages branch if missing
        run: |
          if [ ! -d "gh-pages" ] || [ -z "$(ls -A gh-pages)" ]; then
            mkdir -p gh-pages
            git -C gh-pages init
            git -C gh-pages checkout --orphan gh-pages
          fi
 
      - name: Add report to gh-pages
        run: |
          PREFIX="${{ needs.set-report-name.outputs.report-prefix }}"
          mkdir -p "gh-pages/${PREFIX}"
          cp -r playwright-report/. "gh-pages/${PREFIX}/"
 
      - name: Commit and push to gh-pages
        run: |
          PREFIX="${{ needs.set-report-name.outputs.report-prefix }}"
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${PREFIX}/"
          git commit -m "report: ${PREFIX} [${GITHUB_SHA::7}]"
          git push origin HEAD:gh-pages
 
      - name: Print report URL
        run: |
          PREFIX="${{ needs.set-report-name.outputs.report-prefix }}"
          REPO="${{ github.repository }}"
          ORG=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          echo "📊 Report → https://${ORG}.github.io/${REPO_NAME}/${PREFIX}/"
