name: Run and Test Next Project

on:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"
      - "v[0-9]+.[0-9]+"
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"
      - "v[0-9]+.[0-9]+"

jobs:
  install:
    uses: ./.github/workflows/install.yml
    with:
      sha: ${{ github.sha }}
  
  test_check_dep:
    runs-on: ubuntu-latest
    needs: install

    outputs:
      configured: ${{ steps.is_configured.outputs.configured }}

    steps:
      - uses: actions/download-artifact@v4
        id: download
        with:
          name: build-${{ github.sha }}
          path: .
      
      - name: Check if tests are configured
        id: is_configured
        run: |
          if [[ -z $(ls -la node_modules/.bin/playwright 2>/dev/null) ]]; then
            echo "Playwright tests NOT configured. Will be skipped !"
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "Playwright tests configured."
            echo "configured=true" >> $GITHUB_OUTPUT
          fi;

  test:
    runs-on: ubuntu-latest
    needs: test_check_dep
    if: needs.test_check_dep.outputs.configured == 'true'

    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup project
        uses: ./.github/actions/setup
        with:
          node-version: "20"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
 
      - name: Install Playwright system deps (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ vars.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  skip_test:
    runs-on: ubuntu-latest
    needs: test_check_dep
    if: needs.test_check_dep.outputs.configured == 'false'
    
    steps:
      - run: echo -e "\033[0;31mPlaywright tests skipped ...\033[0m"
      - run: exit 1
