name: Run and Test Next Project

on:
  pull_request:
    branches: [main, develop]

jobs:
  install:
    uses: ./.github/workflows/install.yml
    with:
      sha: ${{ github.sha }}
      build: false
  
  test_check_dep:
    runs-on: ubuntu-latest
    needs: install

    outputs:
      configured: ${{ steps.is_configured.outputs.configured }}

    steps:
      - uses: actions/download-artifact@v4
        id: download
        with:
          name: build-${{ github.sha }}
          path: .
      
      - name: Check if tests are configured
        id: is_configured
        run: |
          if [[ -z $(ls -la node_modules/.bin/playwright 2>/dev/null) ]]; then
            echo "Playwright tests NOT configured. Will be skipped !"
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "Playwright tests configured."
            echo "configured=true" >> $GITHUB_OUTPUT
          fi;

  test:
    runs-on: ubuntu-latest
    needs: test_check_dep
    if: needs.test_check_dep.outputs.configured == 'true'
    
    steps:
      - uses: actions/download-artifact@v4
        id: download
        with:
          name: build-${{ github.sha }}
          path: .

      - name: List artifact files
        run: |
          ls -la ${{ steps.download.outputs.download-path }}
          pwd
          ls -la /home/runner/work/crowdcad/
          sudo chown runner:runner /usr/local/bin/npx /usr/local/bin/npm
          ls -la /usr/local/bin/
      
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: 20.x
      #     cache: npm
      
      # - name: Setup Java 21
      #   uses: actions/setup-java@v4
      #   with:
      #     distribution: temurin
      #     java-version: '21'

      # - name: Install Playwright Chromium browser
      #   run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ vars.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  skip_test:
    runs-on: ubuntu-latest
    needs: test_check_dep
    if: needs.test_check_dep.outputs.configured == 'false'
    
    steps:
      - run: echo -e "\033[0;31mPlaywright tests skipped ...\033[0m"
      - run: exit 1
