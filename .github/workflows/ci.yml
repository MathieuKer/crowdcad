name: Run and Test Next Project

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  set-environment:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
 
      - id: set-env
        uses: ./.github/actions/set-environment
    
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs: set-environment
    environment: ${{ needs.set-environment.outputs.environment }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup project
        uses: ./.github/actions/setup
        with:
          node-version: ${{ vars.NODE_VERSION }}
      
      - name: Check if playwright installed
        run: |
          if [[ -z $(ls -la node_modules/.bin/playwright 2>/dev/null) ]]; then
            echo -e "\033[0;31mPlaywright tests NOT configured. Please install playwright module.\033[0m"
            exit 1
          fi;

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
 
      - name: Install Playwright system deps (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: "Firebase Tools: Setup Java 21"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_TEST_EMAIL: ${{ vars.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
